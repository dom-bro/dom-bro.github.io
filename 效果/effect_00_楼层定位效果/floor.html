<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"><title>楼层定位效果 - 不使用transform</title><link rel="stylesheet" href="/dist/效果/effect_00/css/index.css"></head><body class=""><style>
    .tab-container{
        width: 100%;
        overflow: auto;
    }
    .tab-wrapper{
        /*display: flex;*/
        width: 1000000%;
        word-break: keep-all;
        white-space: nowrap;
    }
</style>
<div id="index" style="display: none" v-show="server.success">
    <div class="nav fixed-header">
        <div class="tab-container">
            <div class="tab-wrapper">
                <a class="item tab-item unit"
                   href="javascript:;"
                   v-for="(item,index) in server.head"
                   :data-href="'#floor_0'+index"
                   :item-id="item.id%20"
                >{{item.name}}</a>
            </div>
        </div>
    </div>
    <div style="position: fixed;top:20%;line-height: 10;background: red;color:#fff;width: 10000%;transform: translate3d(0px, 0px, 0px);">
        <div v-for="i in 2000" style="display: inline">test</div>
    </div>

    <div class="floor unit"
         v-for="(item,index) in server.head"
         :id="'floor_0'+index">
        <h3>{{item.name}}</h3>
        <a href="javascript:;"
           @click="openSecondWebView('/views/demo/demo')"
           style="color: blue"
        >打开一个新的 webview</a>
        <div>{{item.description}}</div>
        <div class="status"></div>
    </div>
</div><script src="/lib/jquery/jquery-3.2.1.js"></script><script src="/lib/vue/vue.js"></script><script src="/dist/效果/effect_00/js/floor.js"></script></body></html>
