<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"><title>通用弹窗</title><link rel="stylesheet" href="/lib/bootstrap/css/bootstrap.css"><link rel="stylesheet" href="/dist/效果/effect_04/css/index.css"></head><body class=""><div class="container">
    <div class="row">
        <h2>实例化时自动绑定事件</h2>
    </div>
    <div class="row">
        <div class="btn btn-primary btn-lg open-popup-A">打开弹窗A</div>
    </div>
    <div class="row">
        <div class="btn btn-info btn-lg open-popup-B">打开弹窗B | onOpen | onClose</div>
    </div>
    <div class="row">
        <div class="btn btn-success btn-lg open-popup-C">打开弹窗C | 渐现效果 | 点击遮罩时关闭</div>
    </div>
    <div class="row">
        <div class="btn btn-danger btn-lg open-popup-D">打开弹窗D | 渐现效果 | onOpen | onClose</div>
    </div>

    <hr class="row">

    <div class="row">
        <h2>with jQuery</h2>
    </div>
    <div class="row">
        <div class="btn btn-primary btn-lg clickBtnA">A</div>
        <div class="btn btn-info btn-lg clickBtnB">B</div>
    </div>

    <hr class="row">

    <div class="row">
        <h2>with Vue</h2>
    </div>
    <div id="index">
        <div class="row">
            <div class="btn btn-success btn-lg" @click="openPopupC">C</div>
            <div class="btn btn-danger btn-lg" @click="openPopupD">D</div>
        </div>
    </div>
</div>

<div id="popup-A" class="popup" style="display: none">
    <div class="popup-inner">
        <div class="popup-content">A</div>
        <div class="foot-btn">
            <div class="btn btn-primary btn-lg close-popup-A">关闭弹窗 A</div>
        </div>
    </div>
</div>

<div id="popup-B" class="popup" style="display: none">
    <div class="popup-inner">
        <div class="popup-content">B</div>
        <div class="foot-btn">
            <div class="btn btn-info btn-lg close-popup-B">关闭弹窗 B</div>
            <div class="btn btn-primary btn-lg open-popup-A">打开弹窗 A</div>
        </div>
    </div>
</div>

<div id="popup-C-mask" class="popup" style="display: none"></div>
<div id="popup-C" class="popup-inner" style="display: none">
    <div class="popup-content">C</div>
    <div class="foot-btn">
        <div class="btn btn-success btn-lg close-popup-C">关闭弹窗 C</div>
        <div class="btn btn-danger btn-lg open-popup-D">打开弹窗 D</div>
    </div>
</div>

<div id="popup-D" class="popup" style="display: none">
    <div class="popup-inner">
        <div class="popup-content">D</div>
        <div class="foot-btn">
            <div class="btn btn-danger btn-lg close-popup-D">关闭弹窗 D</div>
        </div>
    </div>
</div>
<script src="/lib/jquery/jquery-3.1.1.min.js"></script><script src="/lib/vue/vue.js"></script><script src="/lib/bootstrap/js/bootstrap.js"></script><script src="/dist/效果/effect_04/js/index.js"></script></body></html>
