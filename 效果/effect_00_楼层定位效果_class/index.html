<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"><title>楼层定位效果</title><link rel="stylesheet" href="/lib/swiper/css/swiper.css"><link rel="stylesheet" href="/dist/效果/effect_00_class/css/index.css"></head><body class=""><div id="index" style="display: none" v-show="server.success">
    <div class="nav fixed-header">
        <div id="status">0</div>
        <div class="swiper-container">
            <div class="swiper-wrapper">
                <a class="item swiper-slide unit"
                   href="javascript:;"
                   v-for="(item,index) in server.head"
                   :data-href="'#floor_0'+index"
                   :item-id="item.id%20"
                >{{item.name}}</a>
            </div>
        </div>
    </div>

    <div class="floor unit"
         v-for="(item,index) in server.head"
         :id="'floor_0'+index">
        <h3>{{item.name}}</h3>
        <div>{{item.description}}</div>
        <div class="status"></div>
    </div>
</div><script src="/lib/jquery/jquery-3.1.1.min.js"></script><script src="/lib/vue/vue.js"></script><script src="/lib/swiper/js/swiper.js"></script><script src="/dist/效果/effect_00_class/js/index.js"></script></body></html>
